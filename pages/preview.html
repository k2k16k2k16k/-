<script>
// ===== Three.js セットアップ =====
const canvas = document.getElementById('three-canvas');
const wrap   = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x111318, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(80, 60, 120);
camera.lookAt(0, 0, 0);

// ライト
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 100, 50);
scene.add(ambient, dirLight);

// 軸
const axesHelper = new THREE.AxesHelper(30);
scene.add(axesHelper);

// グリッド
const grid = new THREE.GridHelper(200, 20, 0x2a2d36, 0x2a2d36);
grid.rotation.x = Math.PI / 2;
scene.add(grid);

// オブジェクト管理
let rapidLines = null, cutLines = null, arcLines = null, workpiece = null;

// マウス操作（簡易オービット）
let isDragging=false, prevX=0, prevY=0, theta=30, phi=60, radius=180;
canvas.addEventListener('mousedown', e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY});
canvas.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  theta -= (e.clientX-prevX)*0.4;
  phi   -= (e.clientY-prevY)*0.4;
  phi = Math.max(5, Math.min(175, phi));
  prevX=e.clientX; prevY=e.clientY;
  updateCameraPos();
});
canvas.addEventListener('mouseup', ()=>isDragging=false);
canvas.addEventListener('mouseleave', ()=>isDragging=false);
canvas.addEventListener('wheel', e=>{
  radius = Math.max(20, Math.min(600, radius + e.deltaY*0.3));
  updateCameraPos(); e.preventDefault();
},{passive:false});

// タッチ操作
let lastTouchDist=0;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===1){isDragging=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;}
  if(e.touches.length===2){lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===1&&isDragging){
    theta-=(e.touches[0].clientX-prevX)*0.4;
    phi  -=(e.touches[0].clientY-prevY)*0.4;
    phi=Math.max(5,Math.min(175,phi));
    prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;
    updateCameraPos();
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    radius=Math.max(20,Math.min(600,radius-(d-lastTouchDist)*0.5));
    lastTouchDist=d; updateCameraPos();
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>isDragging=false);

function updateCameraPos() {
  const t=theta*Math.PI/180, p=phi*Math.PI/180;
  camera.position.set(radius*Math.sin(p)*Math.sin(t), radius*Math.cos(p), radius*Math.sin(p)*Math.cos(t));
  camera.lookAt(scene.position);
}

function resetCamera() { theta=30; phi=60; radius=180; updateCameraPos(); }
function setView(v) {
  if(v==='top'){theta=0;phi=1;radius=160;}
  else if(v==='front'){theta=0;phi=90;radius=160;}
  else if(v==='side'){theta=90;phi=90;radius=160;}
  updateCameraPos();
}

// リサイズ
function resizeRenderer() {
  const w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resizeRenderer).observe(wrap);
resizeRenderer();

// アニメーションループ
function animate() { requestAnimationFrame(animate); renderer.render(scene,camera); }
animate();

// ===== Gコードパーサー（G02/G03円弧補間・旋盤XZ正確変換）=====
function parseGcode(src) {
  const lines = src.split('\n');
  const segs = [];
  let pos = {x:0, z:0};  // x=半径値, z=軸方向
  let isRapid = false;
  let feedRate = 0;
  let absMode = true;
  let currentG = 1; // 最後に指定されたGモード

  for (const rawLine of lines) {
    const line = rawLine.replace(/\(.*?\)/g,'').trim().toUpperCase();
    if (!line || line.startsWith('%') || line.startsWith(';')) continue;

    const tok = (k) => { const m=line.match(new RegExp('(?<![A-Z])'+k+'(-?[\\d.]+)')); return m?parseFloat(m[1]):null; };

    if (line.includes('G90')) absMode=true;
    if (line.includes('G91')) absMode=false;

    const g=tok('G');
    const x=tok('X'); const z=tok('Z');
    const i=tok('I'); const k2=tok('K'); // 円弧中心オフセット
    const r=tok('R'); // 円弧半径指定
    const f=tok('F');
    if (f!==null) feedRate=f;
    if (g!==null) currentG=g;
    if (g===0) isRapid=true;
    if (g===1||g===2||g===3) isRapid=false;

    // 旋盤座標変換：X=直径→半径, Z=軸
    const nx = x!==null ? (absMode ? x/2 : pos.x+x/2) : pos.x;
    const nz = z!==null ? (absMode ? z   : pos.z+z)   : pos.z;

    if (x!==null || z!==null) {
      const type = currentG===2?'arc_cw': currentG===3?'arc_ccw': (isRapid||currentG===0)?'rapid':'cut';

      if ((currentG===2||currentG===3) && (nx!==pos.x || nz!==pos.z)) {
        // G02/G03: 円弧補間 → 点列に分解
        const arcPts = buildArcPoints(pos.x, pos.z, nx, nz, i, k2, r, currentG===3);
        for (let ai=0; ai<arcPts.length-1; ai++) {
          segs.push({type, from:{x:arcPts[ai][0],z:arcPts[ai][1]}, to:{x:arcPts[ai+1][0],z:arcPts[ai+1][1]}, feed:feedRate});
        }
      } else {
        segs.push({ type, from:{x:pos.x,z:pos.z}, to:{x:nx,z:nz}, feed:feedRate });
      }
      pos.x=nx; pos.z=nz;
    }
  }
  return segs;
}

// 円弧を点列に変換（旋盤XZ平面）
function buildArcPoints(sx, sz, ex, ez, iOff, kOff, rVal, ccw) {
  let cx, cz;
  if (rVal !== null && rVal !== undefined) {
    // R指定の場合
    const d = Math.sqrt((ex-sx)**2+(ez-sz)**2);
    const h = Math.sqrt(Math.max(0, rVal**2 - (d/2)**2));
    const mx=(sx+ex)/2, mz=(sz+ez)/2;
    const nx2=-(ez-sz)/d, nz2=(ex-sx)/d;
    const sign = ccw ? -1 : 1;
    cx=mx+sign*h*nx2; cz=mz+sign*h*nz2;
  } else {
    cx = sx + (iOff||0)/2; // I=X方向オフセット（直径→半径）
    cz = sz + (kOff||0);
  }
  const startAngle = Math.atan2(sz-cz, sx-cx);
  const endAngle   = Math.atan2(ez-cz, ex-cx);
  let sweep = endAngle - startAngle;
  if (ccw && sweep<0) sweep += 2*Math.PI;
  if (!ccw && sweep>0) sweep -= 2*Math.PI;
  const steps = Math.max(8, Math.ceil(Math.abs(sweep)*8));
  const pts = [];
  for (let i=0;i<=steps;i++) {
    const a = startAngle + sweep*(i/steps);
    const R = Math.sqrt((sx-cx)**2+(sz-cz)**2);
    pts.push([cx+R*Math.cos(a), cz+R*Math.sin(a)]);
  }
  return pts;
}

// 回転体ジオメトリを生成（旋盤の加工後形状）
function buildLatheGeometry(segs) {
  const profile = [];
  let minZ=Infinity, maxZ=-Infinity, maxR=0;
  segs.forEach(s => {
    minZ=Math.min(minZ,s.from.z,s.to.z);
    maxZ=Math.max(maxZ,s.from.z,s.to.z);
    maxR=Math.max(maxR,s.from.x,s.to.x);
  });
  if (maxR<0.5) return null;

  // 切削パスのみから外形プロファイルを抽出
  const cutSegs = segs.filter(s=>s.type==='cut'||s.type.startsWith('arc'));
  if (cutSegs.length < 2) return null;

  // Z方向に分割してプロファイル点を収集
  const profileMap = new Map();
  cutSegs.forEach(s => {
    [[s.from.x,s.from.z],[s.to.x,s.to.z]].forEach(([r,z]) => {
      const zKey = Math.round(z*10);
      if (!profileMap.has(zKey) || profileMap.get(zKey) < r) profileMap.set(zKey, r);
    });
  });

  // Three.js LatheGeometry用のVector2配列
  const points = Array.from(profileMap.entries())
    .sort((a,b)=>a[0]-b[0])
    .map(([zk,r]) => new THREE.Vector2(Math.max(0.1,r), zk/10));

  if (points.length < 2) return null;
  try {
    const geo = new THREE.LatheGeometry(points, 32);
    // Y/Zを旋盤座標に合わせる
    geo.rotateX(Math.PI/2);
    return geo;
  } catch(e) { return null; }
}

function buildLines(segs) {
  const rapidPts=[], cutPts=[], arcPts=[];
  for (const s of segs) {
    const arr = s.type==='rapid'?rapidPts : s.type.startsWith('arc')?arcPts : cutPts;
    // 旋盤の回転体表現: x=半径, 3D空間ではy=0のXZ平面に描画
    arr.push(s.from.x, 0, s.from.z, s.to.x, 0, s.to.z);
  }
  const mkLine = (pts, color, width=1) => {
    if (!pts.length) return null;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({color, linewidth:width}));
  };
  return {
    rapid: mkLine(rapidPts, 0x3b82f6, 1),
    cut:   mkLine(cutPts,   0x22c55e, 2),
    arc:   mkLine(arcPts,   0xf59e0b, 2),
  };
}

function buildWorkpiece(segs) {
  // 回転体ジオメトリを優先、なければ素材円柱
  const latheGeo = buildLatheGeometry(segs);
  if (latheGeo) {
    const mat = new THREE.MeshPhongMaterial({color:0x60a0d0, transparent:true, opacity:0.18, side:THREE.DoubleSide, wireframe:false});
    const mesh = new THREE.Mesh(latheGeo, mat);
    // ワイヤーフレームも重ねる
    const wfMat = new THREE.MeshBasicMaterial({color:0x4080aa, wireframe:true, opacity:0.06, transparent:true});
    const wfMesh = new THREE.Mesh(latheGeo, wfMat);
    const group = new THREE.Group();
    group.add(mesh); group.add(wfMesh);
    return group;
  }
  // フォールバック: 素材円柱
  let maxR=0, minZ=0, maxZ=0;
  for (const s of segs) {
    maxR=Math.max(maxR,Math.abs(s.from.x),Math.abs(s.to.x));
    minZ=Math.min(minZ,s.from.z,s.to.z);
    maxZ=Math.max(maxZ,s.from.z,s.to.z);
  }
  if (maxR < 1) return null;
  const r = maxR + 3;
  const len = Math.max(10, maxZ - minZ + 10);
  const geo = new THREE.CylinderGeometry(r, r, len, 32, 1, true);
  const mat = new THREE.MeshPhongMaterial({color:0xaabbcc, transparent:true, opacity:0.15, side:THREE.DoubleSide});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI/2;
  mesh.position.z = (minZ+maxZ)/2;
  return mesh;
}

function parseAndRender() {
  const src = document.getElementById('gcode-input').value;
  if (!src.trim()) { showToast('Gコードを入力してください','error'); return; }

  // 古いオブジェクト削除
  [rapidLines, cutLines, arcLines, workpiece].forEach(o=>{ if(o) scene.remove(o); });

  const segs = parseGcode(src);
  if (!segs.length) { showToast('有効なXZ移動コードが見つかりません','error'); return; }

  const built = buildLines(segs);
  rapidLines=built.rapid; cutLines=built.cut; arcLines=built.arc;
  [rapidLines,cutLines,arcLines].forEach(l=>{ if(l) scene.add(l); });

  workpiece = buildWorkpiece(segs);
  if (workpiece) scene.add(workpiece);

  // セグメントリスト
  const segEl = document.getElementById('seg-list');
  segEl.innerHTML = segs.slice(0,50).map((s,i)=>
    `<div class="seg-item ${s.type}" onclick="highlightSeg(${i})">
      ${String(i+1).padStart(3,' ')} ${s.type.padEnd(6,' ')} X${(s.to.x*2).toFixed(1)} Z${s.to.z.toFixed(1)}
    </div>`
  ).join('') + (segs.length>50?`<div style="font-size:11px;color:var(--text3);padding:4px 8px">...他${segs.length-50}行</div>`:'');

  document.getElementById('parse-stats').textContent = `解析: ${segs.length}セグメント / 早送り:${segs.filter(s=>s.type==='rapid').length} 切削:${segs.filter(s=>s.type==='cut').length}`;
  document.getElementById('parse-info').textContent = `${segs.length} segments`;

  // カメラ自動フィット
  let maxR=0, maxZ=0;
  segs.forEach(s=>{ maxR=Math.max(maxR,Math.abs(s.to.x),Math.abs(s.from.x)); maxZ=Math.max(maxZ,Math.abs(s.to.z),Math.abs(s.from.z)); });
  radius = Math.max(80, Math.max(maxR,maxZ)*3);
  updateCameraPos();
  updateVisibility();
}

function updateVisibility() {
  if(rapidLines) rapidLines.visible = document.getElementById('show-rapid').checked;
  if(cutLines)   cutLines.visible   = document.getElementById('show-cut').checked;
  if(arcLines)   arcLines.visible   = true;
  if(workpiece)  workpiece.visible  = document.getElementById('show-workpiece').checked;
  grid.visible = document.getElementById('show-grid').checked;
}

function clearAll() {
  [rapidLines,cutLines,arcLines,workpiece].forEach(o=>{if(o)scene.remove(o);});
  rapidLines=cutLines=arcLines=workpiece=null;
  document.getElementById('gcode-input').value='';
  document.getElementById('seg-list').innerHTML='';
  document.getElementById('parse-stats').textContent='';
  document.getElementById('parse-info').textContent='';
}

};

function loadSample(key) {
  document.getElementById('gcode-input').value = SAMPLES[key]||'';
  parseAndRender();
}

// 実績ログからの受け取り
document.addEventListener('DOMContentLoaded', () => {
  const code = sessionStorage.getItem('preview_gcode');
  if (code) {
    document.getElementById('gcode-input').value = code;
    sessionStorage.removeItem('preview_gcode');
    parseAndRender();
  } else {
    loadSample('od');
  }
});
</script>
</body>
</html>
